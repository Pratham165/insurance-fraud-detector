services:
  # Flask API Backend
  - type: web
    name: aegis-fraud-api
    runtime: python
    # No rootDir — runs from repo root, so requirements.txt and ml/ are found naturally
    buildCommand: pip install -r requirements.txt
    # Run the root-level wsgi.py
    startCommand: gunicorn wsgi:app
    envVars:
      - key: DEBUG
        value: "False"
      - key: HOST
        value: "0.0.0.0"
      - key: PORT
        value: "10000"
      - key: ALLOWED_ORIGINS
        # Replace with your actual Vercel app URL after deploying frontend
        value: "https://your-app.vercel.app"

